<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ===== 基礎 ===== */
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter', sans-serif;
  background:#0b0b0b;
  color:#fff;
  overflow-x:hidden;
}

/* ===== 背景 ===== */
#bgVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-5;
  filter:brightness(0.4);
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-4;
}

.gradient-bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(201,168,106,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05), transparent 50%);
  z-index:-3;
}

.particles{
  position:fixed;
  inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity:0.2;
  z-index:-2;
}

.light{
  position:fixed;
  width:400px;
  height:400px;
  background:radial-gradient(circle, rgba(201,168,106,0.3), transparent 60%);
  filter:blur(80px);
  pointer-events:none;
  z-index:-1;
}

/* ===== Navbar ===== */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 10%;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

.navbar.scrolled{
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
}

.logo{
  font-family:'Playfair Display', serif;
  font-size:22px;
}

.nav-links{
  display:flex;
  gap:30px;
  list-style:none;
}

.nav-links a{
  color:#fff;
  text-decoration:none;
}

/* ===== HERO ===== */
.hero{
  height:50vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:60px;
  font-family:'Playfair Display', serif;
  background: linear-gradient(90deg,#fff,#C9A86A);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ===== 分類 ===== */
.categories{
  display:flex;
  gap:20px;
  padding:0 10%;
  margin:40px 0;
}

.cat{
  flex:1;
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}

.cat:hover{
  transform:translateY(-5px);
  border:1px solid #C9A86A;
}

/* ===== 商品 ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  padding:0 10% 100px;
}

.card{
  position:relative;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  height:240px;
  object-fit:cover;
  transition:0.5s;
}

.card:hover img{
  transform:scale(1.1);
}

.card::before{
  content:"View Detail";
  position:absolute;
  bottom:0;
  width:100%;
  padding:15px;
  text-align:center;
  background:rgba(0,0,0,0.7);
  transform:translateY(100%);
  transition:0.4s;
}

.card:hover::before{
  transform:translateY(0);
}

.card-content{
  padding:20px;
}

.tag{color:#C9A86A;font-size:12px;}
.price{margin-top:10px}

/* ===== Modal ===== */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.modal-content{
  background:#111;
  padding:20px;
  width:90%;
  max-width:500px;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.buy-btn{
  padding:12px;
  background:#C9A86A;
  border:none;
  cursor:pointer;
}

/* ===== Loader ===== */
.loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:0.6s;
}

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b0b0b;
  color:#fff;
}

.logo{
  font-family:'Playfair Display', serif;
  letter-spacing:2px;
}

.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 10%;
  display:flex;
  justify-content:space-between;
  z-index:1000;
  backdrop-filter:blur(10px);
}

.nav-links{
  display:flex;
  gap:25px;
  list-style:none;
}

.nav-links a{
  color:#fff;
  text-decoration:none;
}

.nav-links a:hover{
  color:#C9A86A;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

</style>
</head>

<body>

<div class="loader">LOADING</div>

<video autoplay muted loop id="bgVideo">
  <source src="your-video.mp4">
</video>

<div class="overlay"></div>
<div class="gradient-bg"></div>
<div class="particles"></div>
<div class="light"></div>

<nav class="navbar">
  <div class="logo">LUXE</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Collection</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
</nav>

<section class="hero">
  <h1>Collection</h1>
  <p>Luxury Watch Experience</p>
</section>

<div class="categories">
  <div onclick="filter('gshock')">G-SHOCK</div>
  <div onclick="filter('edifice')">EDIFICE</div>
  <div onclick="filter('vintage')">VINTAGE</div>
</div>

<div class="grid">
  <div class="card gshock" onclick="openModal('GA-2100','G-SHOCK','https://images.unsplash.com/photo-1523275335684-37898b6baf30','經典八角設計')">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
    <div class="card-content">
      <div class="tag">G-SHOCK</div>
      <h3>GA-2100</h3>
      <div class="price">NT$ 4,500+</div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <img id="mImg">
    <h2 id="mTitle"></h2>
    <p id="mDesc"></p>
    <button>Buy Now</button>
  </div>
</div>

<script>

// DOM
const modal = document.getElementById("modal");
const mTitle = document.getElementById("mTitle");
const mTag = document.getElementById("mTag");
const mImg = document.getElementById("mImg");
const mDesc = document.getElementById("mDesc");

// 篩選
function filter(cat){
  document.querySelectorAll('.card').forEach(item=>{
    item.style.display = (cat==='all'||item.classList.contains(cat))?'block':'none';
  });
}

// Modal
function openModal(title,tag,img,desc){
  modal.style.display='flex';
  mTitle.innerText=title;
  mTag.innerText=tag;
  mImg.src=img;
  mDesc.innerText=desc;
}

modal.addEventListener("click", (e)=>{
  if(e.target === modal){
    modal.style.display = "none";
  }
});

function closeModal(){
  modal.style.display='none';
}

// filter
function filter(cat){
  document.querySelectorAll('.card').forEach(el=>{
    el.style.display = (cat==='all'||el.classList.contains(cat))?'block':'none';
  });
}

// 滑鼠光
const light = document.querySelector('.light');
document.addEventListener('mousemove',e=>{
  light.style.transform=`translate(${e.clientX-200}px,${e.clientY-200}px)`
});

// loader
window.onload = ()=>{
  document.querySelector('.loader').style.opacity=0;
  setTimeout(()=>document.querySelector('.loader').style.display='none',600);
};

// navbar
window.addEventListener("scroll",()=>{
  document.querySelector(".navbar").classList.toggle("scrolled",window.scrollY>50);
});

</script>

</body>
</html>
