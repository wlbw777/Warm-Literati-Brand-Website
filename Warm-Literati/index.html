<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高端品牌網站設計概念</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ===== 基礎 ===== */
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter', sans-serif;
  background:#0b0b0b;
  color:#fff;
  overflow-x:hidden;
}

/* ===== 背景 ===== */
#bgVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-5;
  filter:brightness(0.4);
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-4;
}

.gradient-bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(201,168,106,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05), transparent 50%);
  z-index:-3;
  animation: moveBg 15s infinite alternate;
}

@keyframes moveBg{
  0%{transform:scale(1);}
  100%{transform:scale(1.2) translate(-5%,5%);}
}

.particles{
  position:fixed;
  inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity:0.2;
  z-index:-2;
}

.light{
  position:fixed;
  width:400px;
  height:400px;
  background:radial-gradient(circle, rgba(201,168,106,0.3), transparent 60%);
  filter:blur(80px);
  pointer-events:none;
  z-index:-1;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:'Playfair Display', serif;
  font-size:70px;
  letter-spacing:2px;
  background: linear-gradient(90deg, #fff, #C9A86A);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p{
  color:#aaa;
  margin-top:10px;
}

/* 按鈕 */
.btn{
  margin-top:25px;
  padding:12px 30px;
  border:1px solid #C9A86A;
  color:#C9A86A;
  background:transparent;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.btn::after{
  content:"";
  position:absolute;
  inset:0;
  background:#C9A86A;
  transform:translateX(-100%);
  transition:0.4s;
  z-index:-1;
}

.btn:hover::after{
  transform:translateX(0);
}

.btn:hover{
  color:#000;
}

/* ===== FILTER ===== */
.filter{
  text-align:center;
  margin:40px 0;
}

.filter button{
  margin:5px;
  padding:8px 15px;
  background:#111;
  border:1px solid #333;
  color:#fff;
  cursor:pointer;
}

/* ===== 卡片 ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  padding:0 10% 100px;
}

.card{
  position:relative;
  backdrop-filter: blur(10px);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  overflow:hidden;
  transition:0.4s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 20px 60px rgba(201,168,106,0.2);
}

/* 光掃 */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
  opacity:0;
  transition:0.4s;
}

.card:hover::after{
  opacity:1;
}

.card img{
  width:100%;
  height:240px;
  object-fit:cover;
}

.card-content{
  padding:20px;
}

.tag{color:#C9A86A;font-size:12px;}
.price{margin-top:10px;font-weight:bold;}

/* ===== Modal ===== */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content{
  background:#111;
  padding:20px;
  width:90%;
  max-width:500px;
  border-radius:15px;
}

.modal-content img{
  width:100%;
  max-height:60vh;   /* 限制高度 */
  object-fit:cover;  /* 保持比例裁切 */
  border-radius:10px;
}

/* ===== Loading ===== */
.loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  letter-spacing:3px;
}

/* ===== NAVBAR ===== */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 10%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
  transition:0.4s;
}

.navbar.scrolled{
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
}

.logo{
  font-family:'Playfair Display', serif;
  font-size:22px;
  letter-spacing:2px;
}

.nav-links{
  list-style:none;
  display:flex;
  gap:30px;
}

.nav-links a{
  text-decoration:none;
  color:#fff;
  position:relative;
}

/* 底線動畫 */
.nav-links a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-5px;
  width:0;
  height:1px;
  background:#C9A86A;
  transition:0.3s;
}

.nav-links a:hover::after{
  width:100%;
}

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b0b0b;
  color:#fff;
}

.logo{
  font-family:'Playfair Display', serif;
  letter-spacing:2px;
}

.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 10%;
  display:flex;
  justify-content:space-between;
  z-index:1000;
  backdrop-filter:blur(10px);
}

.nav-links{
  display:flex;
  gap:25px;
  list-style:none;
}

.nav-links a{
  color:#fff;
  text-decoration:none;
}

.nav-links a:hover{
  color:#C9A86A;
}

</style>
</head>

<body>

<div class="loader">LOADING</div>

<video autoplay muted loop playsinline id="bgVideo">
  <source src="your-video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<div class="gradient-bg"></div>
<div class="particles"></div>
<div class="light"></div>

<nav class="navbar">
  <div class="logo">LUXE</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Collection</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>LUXE</h1>
  <p>Timeless Craftsmanship in Motion</p>
  <a href="products.html" class="btn">Explore Collection</a>
</section>

<!-- FILTER -->
<div class="filter">
  <button onclick="filter('all')">ALL</button>
  <button onclick="filter('gshock')">G-SHOCK</button>
  <button onclick="filter('edifice')">EDIFICE</button>
  <button onclick="filter('vintage')">VINTAGE</button>
</div>

<!-- PRODUCTS -->
<div class="grid" id="productGrid">

  <div class="card gshock" onclick="openModal('GA-2100','G-SHOCK','https://www.casio.com/content/dam/casio/product-info/locales/tw/zh-tw/timepiece/product/watch/G/GA/GA2/GA-2100-1A1/assets/GA-2100-1A1_Seq03.jpg.transform/main-visual-sp/image.jpg','八角設計 / 金屬版本')">
    <img src="https://www.casio.com/content/dam/casio/product-info/locales/tw/zh-tw/timepiece/product/watch/G/GA/GA2/GA-2100-1A1/assets/GA-2100-1A1_Seq03.jpg.transform/main-visual-sp/image.jpg">
    <div class="card-content">
      <div class="tag">G-SHOCK</div>
      <h3>GA-2100</h3>
      <div class="price">NT$ 4,500+</div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span onclick="closeModal()">×</span>
    <img id="mImg">
    <h2 id="mTitle"></h2>
    <p id="mTag"></p>
    <p id="mDesc"></p>
  </div>
</div>

<script>
const modal = document.getElementById("modal");
const mTitle = document.getElementById("mTitle");
const mTag = document.getElementById("mTag");
const mImg = document.getElementById("mImg");
const mDesc = document.getElementById("mDesc");

// 篩選
function filter(cat){
  document.querySelectorAll('.card').forEach(item=>{
    item.style.display = (cat==='all'||item.classList.contains(cat))?'block':'none';
  });
}

// Modal
function openModal(title,tag,img,desc){
  modal.style.display='flex';
  mTitle.innerText=title;
  mTag.innerText=tag;
  mImg.src=img;
  mDesc.innerText=desc;
}

modal.addEventListener("click", (e)=>{
  if(e.target === modal){
    modal.style.display = "none";
  }
});

function closeModal(){
  modal.style.display='none';
}

// Loading
window.addEventListener("load",()=>{
  const loader=document.querySelector('.loader');
  loader.style.opacity=0;
  setTimeout(()=>loader.style.display="none",600);
});

// 滑鼠光
const light=document.querySelector('.light');
document.addEventListener('mousemove',e=>{
  light.style.transform=`translate(${e.clientX-200}px,${e.clientY-200}px)`;
});

// GSAP
gsap.registerPlugin(ScrollTrigger);

gsap.from(".hero h1",{opacity:0,y:80,duration:1.2});
gsap.from(".hero p",{opacity:0,y:40,delay:0.3});
gsap.from(".btn",{opacity:0,y:20,delay:0.6});

gsap.utils.toArray(".card").forEach(el=>{
  gsap.from(el,{
    scrollTrigger:{trigger:el,start:"top 85%"},
    opacity:0,y:60,duration:0.8
  });
});

gsap.to("#bgVideo",{scrollTrigger:{scrub:1},scale:1.15});

// navbar 滾動效果
window.addEventListener("scroll", ()=>{
  const nav = document.querySelector(".navbar");
  if(window.scrollY > 50){
    nav.classList.add("scrolled");
  }else{
    nav.classList.remove("scrolled");
  }
});

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

</body>
</html>
